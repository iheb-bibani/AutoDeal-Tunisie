name: Scraping quotidien AutoDeal Tunisie

# Le cron GitHub est TOUJOURS en UTC. La Tunisie est a UTC+1 toute l'annee
# (pas de changement d'heure) : minuit heure tunisienne = 23h00 UTC la veille.
"on":
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Un scraping complet peut durer plusieurs heures. Sans ce garde-fou, un run
# lent et le run du lendemain pourraient tourner en parallele et se pousser
# des commits contradictoires sur les memes fichiers de donnees.
concurrency:
  group: scraping-quotidien
  cancel-in-progress: false

jobs:
  scraping:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 = historique complet. Par defaut checkout ne
          # recupere qu'UN commit (clone superficiel) : un "git pull --rebase"
          # ne peut alors pas se raccorder correctement a l'historique distant,
          # et le push suivant est rejete avec "fetch first" -- exactement
          # l'echec constate en production.
          fetch-depth: 0
            
      - name: Debug version code
        run: |
          git log -1 --oneline
          ls -la
          ls -la utils
          python - <<'PY'
          from pathlib import Path
          print("logger existe:", Path("logger.py").exists())
          print("send telegram:")
          print(Path("utils/send_telegram.py").read_text()[:300])
          PY
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dependances Python
        run: pip install -r requirements.txt

      - name: Installer les navigateurs (Playwright + Patchright)
        run: |
          python -m playwright install --with-deps chromium
          python -m patchright install chromium

      - name: Installer un ecran virtuel (scraper_automobile.py tourne en mode non headless)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Lancer le pipeline complet (scrapers -> nettoyage -> modele -> deals)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: xvfb-run --auto-servernum python main.py

      - name: Verifier que le pipeline a bien produit des donnees
        # Sans ce controle, un pipeline qui echoue a mi-chemin laisse les
        # anciens fichiers en place : le commit suivant ne montre aucun
        # changement et tout parait normal, alors que plus rien n'est a jour.
        run: |
          set -e
          for f in data/processed/tunisia-cars-scored.csv data/models/modele_prix.pkl; do
            test -s "$f" || { echo "Fichier attendu manquant ou vide : $f"; exit 1; }
          done
          python -c "import pandas as pd, sys; d=pd.read_csv('data/processed/tunisia-cars-scored.csv', sep=';', encoding='utf-8-sig'); print(f'{len(d)} annonces scorees'); sys.exit(0 if len(d)>100 else 1)"

      - name: Envoyer les alertes Telegram
        # Telegram est une notification, pas le coeur du pipeline : son echec ne
        # doit jamais empecher l'enregistrement des donnees deja scrapees.
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python utils/send_telegram.py

      - name: Enregistrer les donnees dans le depot
        # if: always() et non success(). Le scraping dure plusieurs heures et
        # les scrapers ecrivent au fil de l'eau dans data/raw : abandonner sur
        # un echec du modele jetterait une nuit entiere de collecte deja
        # payee. Mais publier des fichiers TRAITES incoherents serait pire que
        # de ne rien publier -- on distingue donc les deux :
        #   - data/raw          : append-only, jamais incoherent -> toujours publie
        #   - data/processed    : derives du pipeline -> publies seulement si tout a reussi
        #   - data/models
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw
          if [ "${{ job.status }}" = "success" ]; then
            git add data/processed data/models
          else
            echo "Pipeline en echec : seules les donnees brutes sont publiees."
            echo "Les fichiers traites restent ceux du dernier run reussi."
            # Indispensable : ces fichiers modifies mais NON stages laisseraient
            # l'arbre de travail sale, et "git rebase" refuserait alors de
            # tourner ("error: Please commit or stash them") -- le push
            # echouerait juste apres, emportant aussi les donnees brutes.
            # Ils sont de toute facon incoherents et seront regeneres au
            # prochain run reussi : on les remet a leur dernier etat publie.
            git checkout -- data/processed data/models 2>/dev/null || true
          fi

          git diff --staged --quiet && { echo "Aucune donnee nouvelle a enregistrer."; exit 0; }

          git commit -m "Scraping automatique $(date -u +'%Y-%m-%d %H:%M UTC')"
          git status --short

          # Le push peut etre rejete si un commit est arrive sur le depot
          # pendant le scraping : un push manuel de ta part, ou un run
          # precedent. "fetch first" signifie littéralement qu'il faut d'abord
          # recuperer le distant -- supprimer le rebase ne corrige pas ce
          # message, il le rend certain. On rejoue donc fetch+rebase+push
          # plusieurs fois au lieu d'abandonner des donnees deja collectees.
          #
          # "-X theirs" : pendant un REBASE les roles sont inverses par rapport
          # a un merge. "ours" designe la branche sur laquelle on rejoue (le
          # depot distant) et "theirs" les commits rejoues (les donnees tout
          # juste scrapees). "-X ours" jetterait donc le scraping de la nuit.
          for tentative in 1 2 3 4 5; do
            echo "Publication, tentative $tentative/5..."
            git fetch origin main
            if ! git rebase -X theirs origin/main; then
              echo "Rebase impossible, abandon propre."
              git rebase --abort || true
              sleep 10
              continue
            fi
            if git push origin main; then
              echo "Donnees publiees."
              exit 0
            fi
            echo "Push rejete, nouvelle tentative dans 15 s."
            sleep 15
          done
          echo "Publication impossible apres 5 tentatives."
          exit 1
